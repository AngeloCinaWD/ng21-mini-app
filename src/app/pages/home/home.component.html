<div class="home-container">
  <header>
    <h2>Users</h2>
    <button (click)="authService.logout()">Logout</button>
  </header>

  @if (usersService.errorPublic().status) {
    <p class="error">{{ usersService.errorPublic().message }}</p>
  } @else {
    <ul>
      @for (user of usersService.usersPublic(); track user.id) {
        <li>
          <strong>{{ user.name }}</strong> — {{ user.email }}
        </li>
      } @empty {
        <li>Nessun utente trovato</li>
      }
    </ul>
  }
</div>
