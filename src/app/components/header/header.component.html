<header>
  <nav class="nav-left">
    <a class="app-logo" routerLink="/home">
      <div class="logo-icon">
        <span class="logo-ng">ng</span>
        <span class="logo-version">21</span>
      </div>
      <span class="logo-text">mini-app</span>
    </a>
    <a class="nav-link" routerLink="/users">Users</a>
  </nav>
  <div class="user-section">
    <div class="avatar" [title]="authService.userNamePublic()">
      {{ authService.userInitials() }}
    </div>
    <button (click)="authService.logout()">Logout</button>
  </div>
</header>
